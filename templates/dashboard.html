{% extends "base.html" %}

{% block content %}
<div class="card">
    <h1>Dashboard</h1>
    <div class="dashboard-grid">
        <div class="dashboard-card">
            <h2>Total Devices</h2>
            <p>{{ device_count }}</p>
        </div>
        <div class="dashboard-card">
            <h2>Device Types</h2>
            <p>{{ type_count }}</p>
        </div>
        <div class="dashboard-card">
            <h2>Users</h2>
            <p>{{ user_count }}</p>
        </div>
    </div>
    <div class="dashboard-actions">
        <a class="button" href="{{ url_for('devices') }}">View Devices</a>
    </div>
</div>
{% endblock %}
